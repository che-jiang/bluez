name: Sync Fork
on:
  schedule:
    - cron: '17 */6 * * *'   # 每 6 小时，错开整点减轻 GitHub 负载
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh repo sync che-jiang/bluez -b master
